name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compile Python sources
        run: |
          python -m py_compile \
            src/config.py \
            src/retriever.py \
            src/pipelines/base_llm.py \
            src/pipelines/rag_baseline.py \
            src/pipelines/rag_verify.py \
            src/pipelines/rag_cove.py \
            scripts/run_and_report.py \
            scripts/generate_figures.py
      - name: Re-evaluate committed experiment output
        run: python scripts/run_and_report.py --evaluate-only
